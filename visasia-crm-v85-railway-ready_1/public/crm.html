    if(typeof clients!=='undefined' && Array.isArray(clients)) clients.unshift(item);
    if(typeof selectedClient!=='undefined') selectedClient=tempId;
    if(typeof feed!=='undefined' && Array.isArray(feed)) feed.unshift('Создана новая сделка: '+name+' → '+manager);
    if(typeof closeModal==='function') closeModal();
    if(typeof toast==='function') toast('Сделка создана');
    if(typeof render==='function') render();
    var payload=Object.assign({},item,{stage:String(targetStage),stageId:Number(targetStage)||undefined});
    if(typeof crmApi==='function'){
      crmApi('/api/clients','POST',payload).then(function(saved){
        if(saved && saved.id){item.id=saved.id; if(typeof selectedClient!=='undefined') selectedClient=saved.id;}
        if(typeof dealPendingStage!=='undefined') dealPendingStage=null;
        if(typeof render==='function') render();
        return crmApi('/api/tasks','POST',{clientId:item.id,title:'Связаться с клиентом',dueAt:new Date().toISOString()});
      }).then(function(t){
        if(t && typeof tasks!=='undefined' && Array.isArray(tasks)){tasks.unshift({id:t.id,clientId:t.clientId,title:t.title,due:'today',dueAt:String(t.dueAt||'').slice(0,16),done:false}); if(typeof render==='function')render();}
      }).catch(function(err){console.error(err); if(typeof toast==='function')toast('Сделка создана на экране, но не сохранена в базе')});
    }
  };

  var oldOpenMonthSales=window.openMonthSales;

<script id="crm-v72-control-settings-script">
(function(){
  var SETTINGS_KEY='visasia.department.control.settings.v72';
  var TASK_PATCH_KEY='visasia.task.local.patch.v72';
  function n(v){v=Number(String(v==null?'':v).replace(/[^0-9.-]/g,'')||0);return Number.isFinite(v)?Math.max(0,Math.round(v)):0}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function arrClients(){return (typeof clients!=='undefined'&&Array.isArray(clients))?clients:[]}
  function arrTasks(){return (typeof tasks!=='undefined'&&Array.isArray(tasks))?tasks:[]}
  function arrManagers(){return (typeof managersData!=='undefined'&&Array.isArray(managersData))?managersData:[]}
  function defaults(){return {slaWarningMinutes:10,slaCriticalMinutes:30,stuckStageDays:2,noActivityHours:24,maxActiveLeads:35,maxOpenTasks:20,maxOverdueLeads:5,loadWarningPercent:70,loadCriticalPercent:90,managerMaxActiveLeads:{}}}
  function merge(a,b){a=a||{};b=b||{};var out=Object.assign({},a,b);out.managerMaxActiveLeads=Object.assign({},a.managerMaxActiveLeads||{},b.managerMaxActiveLeads||{});return out}
  window.getDepartmentControlSettingsV72=function(){try{return merge(defaults(),JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}'))}catch(e){return defaults()}}
  window.saveDepartmentControlSettingsV72=function(s){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(merge(defaults(),s||{})))}catch(e){}}
  function managerKey(m){return String((m&&m.id)!=null?m.id:(m&&m.name)||'')}
  function managerName(m){var x=String((m&&m.name)||''); if(x==='Админ') return 'Руководитель ОП'; if(x==='Руководитель') return 'Директор'; return x}
  function isDirector(m){var nm=managerName(m);return nm==='Директор'||String((m&&m.role)||'').toLowerCase()==='owner'}
  function salesManagers(){return arrManagers().filter(function(m){return !isDirector(m)})}
  function managerLimit(key){var s=getDepartmentControlSettingsV72();return n((s.managerMaxActiveLeads||{})[String(key)])||n(s.maxActiveLeads)||35}
  function isCompletedClient(c){
    if(!c) return false;
    var out=String(c.outcome||'').toLowerCase(); var st=String(c.status||'').toLowerCase(); var stage=String(c.stage||c.stageKey||'').toLowerCase();
    if(out==='realized'||out==='unrealized'||out==='реализовано'||out==='не реализовано') return true;
    if(st==='paid'||st==='closed'||st==='realized'||st==='unrealized') return true;
    if(stage==='closed'||stage==='realized'||stage==='unrealized') return true;
    var title=''; try{var ss=(typeof stages!=='undefined'&&Array.isArray(stages)?stages:[]).find(function(x){return String(x.id)===String(c.stage)}); title=String((ss&&ss.title)||'').toLowerCase()}catch(e){}
    if(title.indexOf('реализ')>=0 || title.indexOf('отказ')>=0) return true;
    return false;
  }
  window.isCompletedClientV72=isCompletedClient;
  window.getSlaTarget=function(){return n(getDepartmentControlSettingsV72().slaWarningMinutes)||10}
  window.clientSlaMinutesV70=function(c){
    if(!c || isCompletedClient(c)) return 0;
    if(n(c.responseMinutes||c.responseTimeMinutes)) return n(c.responseMinutes||c.responseTimeMinutes);
    var last=String(c.last||'').toLowerCase();
    if(last.indexOf('5 дней')>=0||last.indexOf('без движения')>=0) return 5*24*60;
    if(String(c.status||'')==='risk') return 180;
    if(String(c.stage||'')==='new') return 42;
    if(String(c.stage||'')==='waiting') return 28;
    if(String(c.stage||'')==='docs') return 12;
    if(String(c.stage||'')==='consult') return 18;
    return 9;
  }
  window.formatSlaV70=function(min){min=n(min);if(min>=1440)return Math.round(min/1440)+' дн';if(min>=60)return Math.floor(min/60)+' ч '+(min%60?min%60+' м':'');return min+' мин'}
  window.clientOpenTasksV70=function(c){return arrTasks().filter(function(t){return !t.done && String(t.clientId)===String(c.id)})}
  window.clientOverdueTasksV70=function(c){return clientOpenTasksV70(c).filter(function(t){return String(t.due)==='overdue' || (t.dueAt && Date.parse(t.dueAt)<Date.now())})}
  window.clientRiskV70=function(c){
    var s=getDepartmentControlSettingsV72();
    if(!c || isCompletedClient(c)) return {level:'ok',label:'Завершено',score:0,reason:'работа завершена'};
    var sla=clientSlaMinutesV70(c), overdue=clientOverdueTasksV70(c).length, days=(typeof daysInStage==='function'?daysInStage(c):0);
    if(overdue>0) return {level:'bad',label:'Критично',score:100,reason:'просрочена задача'};
    if(sla>n(s.slaCriticalMinutes)) return {level:'bad',label:'Критично',score:95,reason:'SLA критично нарушен'};
    if(days>n(s.stuckStageDays)) return {level:'bad',label:'Критично',score:90,reason:'завис в этапе '+days+' дн'};
    if(sla>n(s.slaWarningMinutes)) return {level:'warn',label:'Риск',score:65,reason:'ответ дольше нормы'};
    if(clientOpenTasksV70(c).length===0) return {level:'warn',label:'Риск',score:55,reason:'нет задачи'};
    return {level:'ok',label:'Норма',score:20,reason:'контроль в норме'};
  }
  function localTaskPatches(){try{return JSON.parse(localStorage.getItem(TASK_PATCH_KEY)||'{}')}catch(e){return {}}}
  function setLocalTaskPatch(id,patch){if(!id)return;var p=localTaskPatches();p[String(id)]=Object.assign({},p[String(id)]||{},patch||{});try{localStorage.setItem(TASK_PATCH_KEY,JSON.stringify(p))}catch(e){}}
  function applyTaskPatches(){var p=localTaskPatches();arrTasks().forEach(function(t){var x=p[String(t.id)];if(x){Object.assign(t,x);if(t.dueAt && typeof classifyDue==='function')t.due=classifyDue(t.dueAt)}})}
  var prevRender=window.render;if(typeof prevRender==='function'){window.render=function(){applyTaskPatches();return prevRender.apply(this,arguments)}};applyTaskPatches();

  function stageTitle(c){var st=arrStages().find(function(s){return String(s.id)===String(c.stage);});return st?st.title:'';}
  function curUser(){return window.currentUser||null;}
  function isOwnerView(){var u=curUser();return u?(u.role==='owner'||u.role==='admin'):(window.mode==='owner');}

  // ---------- ZEROED persistent store ----------
  var LS_HISTORY='visasia_broadcasts_v75';
  var LS_TPL='visasia_broadcast_templates_v75';
  function loadHistory(){try{return JSON.parse(localStorage.getItem(LS_HISTORY)||'[]')||[];}catch(e){return [];}}
  function saveHistory(h){try{localStorage.setItem(LS_HISTORY,JSON.stringify(h));}catch(e){}}
  function loadTpls(){try{return JSON.parse(localStorage.getItem(LS_TPL)||'[]')||[];}catch(e){return [];}}
  function saveTpls(t){try{localStorage.setItem(LS_TPL,JSON.stringify(t));}catch(e){}}
  window.bc75History=window.bc75History||loadHistory();
  window.bc75Templates=window.bc75Templates||loadTpls();

  // ---------- current composer selection (in-memory) ----------
  window.bc75Sel=window.bc75Sel||{scope:'mine',dirs:[],stages:[],mgrs:[],text:''};
  if(!window.bc75Sel.mgrs)window.bc75Sel.mgrs=[];
  window.bc75Filter=window.bc75Filter||'all';

  function salesMgrNames(){
    // managers a director can target (exclude director/admin themselves)
    var list=(typeof managersData!=='undefined'&&Array.isArray(managersData))?managersData:(window.managersData||[]);
    return list.filter(function(m){
      var n=String(m.name||'');var r=String(m.role||'').toLowerCase();
      return n!=='Директор'&&n!=='Руководитель'&&n!=='Админ'&&r!=='owner'&&r!=='admin';
    }).map(function(m){return m.name;});
  }
  window.bc75SalesMgrNames=salesMgrNames;

  // who the manager may target
  function baseAudience(){
    var all=arrClients();
    if(isOwnerView()){
      // директор/руководитель: либо выбранные менеджеры, либо все
      var sel=window.bc75Sel.mgrs||[];
      if(sel.length) return all.filter(function(c){return sel.indexOf(c.manager)>=0;});
      return all;
    }
    // менеджер: только свои клиенты (всегда)
    var u=curUser();
    if(!u) return all;
    return all.filter(function(c){return c.manager===u.name;});
  }
  function selectedClients(){
    var list=baseAudience();
    var sel=window.bc75Sel;
    if(sel.dirs.length) list=list.filter(function(c){return sel.dirs.indexOf(dirGroup(c.direction))>=0;});
    if(sel.stages.length) list=list.filter(function(c){return sel.stages.indexOf(stageTitle(c))>=0;});
    return list;
  }
  window.bc75SelectedClients=selectedClients;

  // ---------- toggles ----------
  window.bc75SetScope=function(s){window.bc75Sel.scope=s;if(typeof render==='function')render();};
  window.bc75ToggleDir=function(d){var a=window.bc75Sel.dirs;var i=a.indexOf(d);if(i>=0)a.splice(i,1);else a.push(d);if(typeof render==='function')render();};
  window.bc75ToggleStage=function(s){var a=window.bc75Sel.stages;var i=a.indexOf(s);if(i>=0)a.splice(i,1);else a.push(s);if(typeof render==='function')render();};
  window.bc75ToggleMgr=function(m){var a=window.bc75Sel.mgrs;var i=a.indexOf(m);if(i>=0)a.splice(i,1);else a.push(m);
    // если выбранные направления/этапы больше не встречаются у выбранных менеджеров — оставляем как есть, пересчёт сам отфильтрует
    if(typeof render==='function')render();};
  window.bc75AllMgrs=function(){window.bc75Sel.mgrs=[];if(typeof render==='function')render();};
  window.bc75ClearFilters=function(){window.bc75Sel.dirs=[];window.bc75Sel.stages=[];window.bc75Sel.mgrs=[];if(typeof render==='function')render();};
  window.bc75SyncText=function(el){window.bc75Sel.text=el.value;var cnt=document.getElementById('bc75CharCount');if(cnt)cnt.textContent=el.value.length;};
  window.bc75InsertVar=function(v){var ta=document.getElementById('bc75Text');if(!ta)return;var s=ta.selectionStart||ta.value.length;ta.value=ta.value.slice(0,s)+v+ta.value.slice(ta.selectionEnd||s);window.bc75Sel.text=ta.value;ta.focus();var cnt=document.getElementById('bc75CharCount');if(cnt)cnt.textContent=ta.value.length;};
  window.bc75CellSelect=function(dir,stage){
    // clicking a matrix cell sets exactly that filter pair for quick targeting
    window.bc75Sel.dirs=dir?[dir]:[];
    window.bc75Sel.stages=stage?[stage]:[];
    if(typeof toast==='function')toast('Фильтр применён: '+(dir||'все направления')+(stage?' · '+stage:''));
    if(typeof render==='function')render();
    var c=document.querySelector('.bc75Panel');if(c)c.scrollIntoView({behavior:'smooth',block:'start'});
  };

  // ---------- templates ----------
  window.bc75UseTpl=function(i){var t=window.bc75Templates[i];if(!t)return;window.bc75Sel.text=t.text;if(typeof render==='function')render();setTimeout(function(){var ta=document.getElementById('bc75Text');if(ta){ta.value=t.text;ta.focus();}},30);if(typeof toast==='function')toast('Шаблон подставлен');};
  window.bc75AddTplModal=function(idx){
    var editing=(typeof idx==='number');var t=editing?window.bc75Templates[idx]:{title:'',text:''};
    showModal('<h3>'+(editing?'Изменить шаблон':'Новый быстрый шаблон')+'</h3>'
      +'<div class="field"><label>Название</label><input id="bc75TplTitle" value="'+esc(t.title)+'" placeholder="Например: Напоминание об оплате"></div>'
      +'<div class="field"><label>Текст сообщения</label><textarea id="bc75TplText" placeholder="Текст, который часто отправляете...">'+esc(t.text)+'</textarea></div>'
      +'<div class="modalActions">'
      +(editing?'<button class="btn" onclick="bc75DeleteTpl('+idx+')">Удалить</button>':'')
      +'<button class="btn" onclick="closeModal()">Отмена</button>'
      +'<button class="btn primary" onclick="bc75SaveTpl('+(editing?idx:'-1')+')">Сохранить</button></div>');
  };
  window.bc75SaveTpl=function(idx){
    var title=(document.getElementById('bc75TplTitle')||{}).value||'';
    var text=(document.getElementById('bc75TplText')||{}).value||'';
    if(!text.trim()){if(typeof toast==='function')toast('Введите текст шаблона');return;}
    title=title.trim()||text.trim().slice(0,28);
    if(idx>=0)window.bc75Templates[idx]={title:title,text:text.trim()};
    else window.bc75Templates.unshift({title:title,text:text.trim()});
    saveTpls(window.bc75Templates);closeModal();if(typeof toast==='function')toast('Шаблон сохранён');if(typeof render==='function')render();
  };
  window.bc75DeleteTpl=function(idx){window.bc75Templates.splice(idx,1);saveTpls(window.bc75Templates);closeModal();if(typeof toast==='function')toast('Шаблон удалён');if(typeof render==='function')render();};
  window.bc75SaveCurrentAsTpl=function(){
    var text=(document.getElementById('bc75Text')||{}).value||window.bc75Sel.text||'';
    if(!text.trim()){if(typeof toast==='function')toast('Сначала напишите текст рассылки');return;}
    window.bc75Templates.unshift({title:text.trim().slice(0,28),text:text.trim()});saveTpls(window.bc75Templates);
    if(typeof toast==='function')toast('Сохранено в быстрые шаблоны');if(typeof render==='function')render();
  };

  // ---------- schedule toggle ----------
  window.bc75ToggleSchedule=function(){var b=document.getElementById('bc75ScheduleBox');if(b)b.classList.toggle('show');};

  // ---------- audience label ----------
  function audienceLabel(){
    var sel=window.bc75Sel;var parts=[];
    if(isOwnerView()){
      parts.push(sel.mgrs&&sel.mgrs.length ? ('Менеджер: '+sel.mgrs.join(', ')) : 'Все клиенты компании');
    } else {
      parts.push('Мои клиенты');
    }
    if(sel.dirs.length)parts.push(sel.dirs.join(', '));
    if(sel.stages.length)parts.push('этап: '+sel.stages.join(', '));
    return parts.join(' · ');
  }
  window.bc75AudienceLabel=audienceLabel;

  // ---------- send / schedule ----------
  function doSend(scheduledAt){
    var text=(document.getElementById('bc75Text')||{}).value||window.bc75Sel.text||'';
    if(!text.trim()){if(typeof toast==='function')toast('Напишите текст рассылки');return;}
    var recips=selectedClients();
    if(!recips.length){if(typeof toast==='function')toast('Нет получателей по выбранным фильтрам');return;}
    var rec={
      id:Date.now(),
      name:text.trim().slice(0,42)+(text.trim().length>42?'…':''),
      text:text.trim(),
      audience:audienceLabel(),
      total:recips.length,
      sent:0,delivered:0,read:0,clicks:0,replies:0,
      status:scheduledAt?'planned':'sent',
      date:scheduledAt? new Date(scheduledAt).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),
      ts:scheduledAt?new Date(scheduledAt).getTime():Date.now(),
      by:(curUser()&&curUser().name)||'Менеджер'
    };
    if(!scheduledAt){
      // мгновенная отправка: пока Telegram-бот не подключён, считаем «отправлено = аудитория»,
      // остальные метрики придут с backend; ставим sent, остальное 0 до реальных событий
      rec.sent=recips.length;
    }
    window.bc75History.unshift(rec);saveHistory(window.bc75History);
    if(typeof feed!=='undefined'&&Array.isArray(feed))feed.unshift((scheduledAt?'Запланирована':'Отправлена')+' рассылка · '+recips.length+' получателей');
    if(typeof toast==='function')toast(scheduledAt?('Рассылка запланирована на '+rec.date):('Рассылка отправлена · '+recips.length+' получателей'));
    // try backend if present (no-op if route missing)
    if(typeof crmApi==='function'){try{crmApi('/api/broadcasts','POST',{text:rec.text,audience:rec.audience,total:rec.total,scheduledAt:scheduledAt||null}).catch(function(){});}catch(e){}}
    window.bc75Sel.text='';
    if(typeof render==='function')render();
  }
  window.bc75SendNow=function(){doSend(null);};
  window.bc75Schedule=function(){var at=(document.getElementById('bc75SchedAt')||{}).value;if(!at){if(typeof toast==='function')toast('Укажите дату и время');return;}doSend(at);};
  window.bc75PeekRecipients=function(){
    var r=selectedClients();
    var rowsHtml=r.slice(0,60).map(function(c){return '<div style="display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px"><span><b>'+esc(c.name)+'</b><br><small style="color:var(--muted)">'+esc(c.direction||'—')+' · '+esc(stageTitle(c)||'—')+'</small></span><span style="color:var(--muted);font-size:11px">'+esc(c.manager||'')+'</span></div>';}).join('')||'<div class="bc75Empty">Нет получателей по этим фильтрам</div>';
    showModal('<h3>Получатели · '+r.length+'</h3><p class="muted" style="margin-top:-6px;font-size:12px">'+esc(audienceLabel())+'</p><div style="max-height:50vh;overflow:auto;margin-top:8px">'+rowsHtml+(r.length>60?'<div class="muted" style="text-align:center;padding:10px;font-size:12px">…и ещё '+(r.length-60)+'</div>':'')+'</div><div class="modalActions"><button class="btn primary" onclick="closeModal()">Готово</button></div>');
  };
  window.bc75ResetAll=function(){
    if(!confirm('Очистить всю историю рассылок и шаблоны? Действие необратимо.'))return;
    window.bc75History=[];window.bc75Templates=[];saveHistory([]);saveTpls([]);
    if(typeof toast==='function')toast('Данные рассылок очищены');if(typeof render==='function')render();
  };

  // ---------- KPI aggregation (real, from history) ----------
  function agg(){
    var sent=window.bc75History.filter(function(b){return b.status==='sent';});
    var s={count:window.bc75History.length,sent:0,delivered:0,read:0,clicks:0,replies:0};
    sent.forEach(function(b){s.sent+=b.sent||0;s.delivered+=b.delivered||0;s.read+=b.read||0;s.clicks+=b.clicks||0;s.replies+=b.replies||0;});
    s.ctr=s.delivered?Math.round(s.clicks/s.delivered*1000)/10:0;
    return s;
  }
  function kpi(icon,cls,title,value,note){return '<div class="bc75Kpi"><div class="bc75KpiIcon '+(cls||'')+'">'+icon+'</div><div style="min-width:0"><small>'+title+'</small><h2>'+value+'</h2><p>'+note+'</p></div></div>';}

  // ---------- audience matrix (direction × stage) ----------
  function flag(name){var m={'Австралия':'🇦🇺','Корея':'🇰🇷','Европа':'🇪🇺','Шенген':'🇪🇺','США':'🇺🇸','ОАЭ':'🇦🇪','Великобритания':'🇬🇧','Канада':'🇨🇦','Турция':'🇹🇷','Узбекистан':'🇺🇿'};return m[name]||'🌍';}
  function matrix(){
    var base=baseAudience();
    var stagesArr=arrStages().slice().sort(function(a,b){return (a.order||0)-(b.order||0);});
    // group directions
    var dirSet={};base.forEach(function(c){var d=dirGroup(c.direction);dirSet[d]=true;});
    var dirs=Object.keys(dirSet);
    if(!dirs.length)return '<div class="bc75Empty"><i class="fa-regular fa-folder-open"></i><b>Пока нет клиентов</b>Аудитория появится, когда добавите клиентов в CRM.</div>';
    // counts
    function cnt(d,stTitle){return base.filter(function(c){return dirGroup(c.direction)===d && stageTitle(c)===stTitle;}).length;}
    function dirTotal(d){return base.filter(function(c){return dirGroup(c.direction)===d;}).length;}
    function stageTotal(stTitle){return base.filter(function(c){return stageTitle(c)===stTitle;}).length;}
    var maxCell=1;dirs.forEach(function(d){stagesArr.forEach(function(s){var v=cnt(d,s.title);if(v>maxCell)maxCell=v;});});
    function cellColor(v){if(!v)return '';var t=Math.min(1,v/maxCell);var a=(0.10+t*0.42).toFixed(2);return 'background:rgba(91,141,239,'+a+')';}
    var head='<tr><th class="dirHead">Направление</th>'+stagesArr.map(function(s){return '<th>'+esc(s.title)+'</th>';}).join('')+'<th>Всего</th></tr>';
    var body=dirs.map(function(d){
      var cells=stagesArr.map(function(s){
        var v=cnt(d,s.title);
        if(!v)return '<td><div class="bc75Cell zero">·</div></td>';
        return '<td><div class="bc75Cell" style="'+cellColor(v)+'" onclick="bc75CellSelect(\''+esc(d).replace(/'/g,"\\'")+'\',\''+esc(s.title).replace(/'/g,"\\'")+'\')" title="'+esc(d)+' · '+esc(s.title)+' — '+v+' клиентов">'+v+'</div></td>';
      }).join('');
      return '<tr><td class="dirCell"><span class="flag">'+flag(d)+'</span>'+esc(d)+'</td>'+cells
        +'<td><div class="bc75Cell bc75TotalCell" onclick="bc75CellSelect(\''+esc(d).replace(/'/g,"\\'")+'\',\'\')" title="Все этапы '+esc(d)+'">'+dirTotal(d)+'</div></td></tr>';
    }).join('');
    var foot='<tr><td class="dirCell" style="color:var(--muted)">Всего по этапу</td>'+stagesArr.map(function(s){var v=stageTotal(s.title);return '<td><div class="bc75Cell '+(v?'':'zero')+'" '+(v?'onclick="bc75CellSelect(\'\',\''+esc(s.title).replace(/'/g,"\\'")+'\')"':'')+' style="background:rgba(255,255,255,.03);font-size:12px">'+(v||'·')+'</div></td>';}).join('')+'<td><div class="bc75Cell bc75TotalCell">'+base.length+'</div></td></tr>';
    return '<div class="bc75MatrixWrap"><table class="bc75Matrix"><thead>'+head+'</thead><tbody>'+body+foot+'</tbody></table></div>'
      +'<div class="bc75MatrixLegend"><div class="lg"><span class="sw" style="background:rgba(91,141,239,.15)"></span>меньше</div><div class="lg"><span class="sw" style="background:rgba(91,141,239,.52)"></span>больше</div><div class="lg" style="margin-left:auto"><i class="fa-solid fa-hand-pointer" style="color:#8ab4ff"></i> нажмите на ячейку, чтобы выбрать аудиторию для рассылки</div></div>';
  }

  // ---------- composer panel ----------
  function composer(){
    var base=baseAudience();
    var dirSet={};base.forEach(function(c){dirSet[dirGroup(c.direction)]=(dirSet[dirGroup(c.direction)]||0)+1;});
    var stagesArr=arrStages().slice().sort(function(a,b){return (a.order||0)-(b.order||0);});
    var stageCount={};base.forEach(function(c){var t=stageTitle(c);if(t)stageCount[t]=(stageCount[t]||0)+1;});
    var sel=window.bc75Sel;
    var recips=selectedClients();
    // подсчёт клиентов на каждого менеджера (для чипов руководителя)
    var mgrCount={};arrClients().forEach(function(c){if(c.manager)mgrCount[c.manager]=(mgrCount[c.manager]||0)+1;});
    var mgrChips='';
    if(isOwnerView()){
      var names=salesMgrNames();
      var allOn=!(sel.mgrs&&sel.mgrs.length);
      mgrChips='<div class="bc75FilterLabel">Менеджер</div><div class="bc75Chips">'
        +'<button class="bc75Chip mgr '+(allOn?'active':'')+'" onclick="bc75AllMgrs()">'+(allOn?'<i class="fa-solid fa-check"></i>':'')+'Все менеджеры <span class="cnt">'+arrClients().length+'</span></button>'
        +names.map(function(m){var on=(sel.mgrs||[]).indexOf(m)>=0;return '<button class="bc75Chip mgr '+(on?'active':'')+'" onclick="bc75ToggleMgr(\''+esc(m).replace(/'/g,"\\'")+'\')">'+(on?'<i class="fa-solid fa-check"></i>':'')+esc(m)+' <span class="cnt">'+(mgrCount[m]||0)+'</span></button>';}).join('')
        +'</div>';
    }
    var scopeRow= isOwnerView()
      ? mgrChips
      : '<div class="bc75Scope"><button class="bc75ScopeBtn active"><i class="fa-solid fa-user"></i> Только мои клиенты</button></div>';
    var dirChips=Object.keys(dirSet).map(function(d){var on=sel.dirs.indexOf(d)>=0;return '<button class="bc75Chip dir '+(on?'active':'')+'" onclick="bc75ToggleDir(\''+esc(d).replace(/'/g,"\\'")+'\')">'+(on?'<i class="fa-solid fa-check"></i>':'')+esc(d)+' <span class="cnt">'+dirSet[d]+'</span></button>';}).join('')||'<span class="muted" style="font-size:12px">нет направлений</span>';
    var stageChips=stagesArr.filter(function(s){return stageCount[s.title];}).map(function(s){var on=sel.stages.indexOf(s.title)>=0;return '<button class="bc75Chip '+(on?'active':'')+'" onclick="bc75ToggleStage(\''+esc(s.title).replace(/'/g,"\\'")+'\')">'+(on?'<i class="fa-solid fa-check"></i>':'')+esc(s.title)+' <span class="cnt">'+stageCount[s.title]+'</span></button>';}).join('')||'<span class="muted" style="font-size:12px">нет этапов</span>';
    var hasFilters=sel.dirs.length||sel.stages.length||(sel.mgrs&&sel.mgrs.length);
    return ''
      +'<div class="bc75PanelHead"><div class="bc75PanelTitle">Создать рассылку<small>Выберите аудиторию, напишите текст и отправьте или запланируйте</small></div></div>'
      +scopeRow
      +'<div class="bc75FilterLabel">Направление'+(hasFilters?' <button class="bc75Link" style="font-size:11px;float:right" onclick="bc75ClearFilters()">сбросить фильтры</button>':'')+'</div>'
      +'<div class="bc75Chips">'+dirChips+'</div>'
      +'<div class="bc75FilterLabel">Этап воронки</div>'
      +'<div class="bc75Chips">'+stageChips+'</div>'
      +'<div class="bc75Recipients"><div><div class="rc">'+recips.length+'</div></div><div class="rl"><b>получателей</b><br>'+esc(audienceLabel())+'</div><button class="bc75RecipientsPeek" onclick="bc75PeekRecipients()">посмотреть список</button></div>'
      +'<div class="bc75TextWrap"><textarea id="bc75Text" class="bc75Text" placeholder="Текст сообщения для клиентов…" oninput="bc75SyncText(this)">'+esc(sel.text||'')+'</textarea></div>'
      +'<div class="bc75TextBar"><div class="bc75Vars">'
        +'<button class="bc75Var" onclick="bc75InsertVar(\'{имя}\')">+ имя</button>'
        +'<button class="bc75Var" onclick="bc75InsertVar(\'{направление}\')">+ направление</button>'
        +'<button class="bc75Var" onclick="bc75InsertVar(\'{менеджер}\')">+ менеджер</button>'
        +'<button class="bc75Var" onclick="bc75SaveCurrentAsTpl()" style="border-style:solid;border-color:rgba(242,214,139,.3);color:#f2d68b"><i class="fa-regular fa-bookmark"></i> в шаблоны</button>'
      +'</div><span class="bc75Count"><span id="bc75CharCount">'+(sel.text||'').length+'</span> симв.</span></div>'
      +'<div class="bc75Send" style="margin-top:13px"><button class="btn primary" onclick="bc75SendNow()"><i class="fa-solid fa-paper-plane"></i> Отправить сейчас</button><button class="btn" onclick="bc75ToggleSchedule()"><i class="fa-regular fa-clock"></i> Запланировать</button></div>'
      +'<div class="bc75ScheduleBox" id="bc75ScheduleBox"><div class="field" style="margin:0"><label style="font-size:12px;color:var(--muted)">Дата и время отправки</label><input type="datetime-local" id="bc75SchedAt"></div><button class="btn primary" style="margin-top:10px;width:100%" onclick="bc75Schedule()"><i class="fa-regular fa-calendar-check"></i> Запланировать рассылку</button></div>';
  }

  // ---------- templates panel ----------
  function templatesPanel(){
    var t=window.bc75Templates;

<!-- v79: рабочие действия карточки клиента (звонок / telegram) -->
<script id="client-actions-v79">
(function(){
  // нормализуем телефон в формат для tel: (оставляем + и цифры)
  function telHref(phone){var p=String(phone||'').replace(/[^\d+]/g,'');return p.length>=5?('tel:'+p):'';}
  // нормализуем telegram username (убираем @, пробелы)
  function tgUser(tg){var t=String(tg||'').trim();if(!t||t==='нет'||t==='—')return '';return t.replace(/^@/,'').replace(/^https?:\/\/t\.me\//,'').replace(/\s/g,'');}

  window.callClient=function(phone){
    var href=telHref(phone);
    if(!href){if(typeof toast==='function')toast('У клиента не указан номер телефона');return;}
    // открываем звонилку устройства (на телефоне/Mini App — набор через оператора)
    window.location.href=href;
  };
  window.openTelegramChat=function(tg, phone){
    var u=tgUser(tg);
    if(u){window.open('https://t.me/'+u,'_blank');return;}
    // нет username — пробуем по номеру (Telegram сам найдёт, если есть аккаунт)
    var p=String(phone||'').replace(/[^\d]/g,'');
    if(p){window.open('https://t.me/+'+p,'_blank');return;}
    if(typeof toast==='function')toast('У клиента не указан Telegram');
  };
  // можно ли клиенту звонить / писать (для гашения кнопок)
  window.clientCanCall=function(phone){return !!telHref(phone);};
  window.clientHasTelegram=function(tg, phone){return !!(tgUser(tg) || String(phone||'').replace(/[^\d]/g,''));};
})();
</script>

<script id="settings-v80-logic">
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  // ---------- хранилище настроек ----------
  var LS='visasia_settings_v80';
  var DEFAULTS={
    company:{name:'Visasia',phone:'',email:'',bin:'',address:'',currency:'KZT'},
    system:{defaultPage:'dashboard',rows:20, tips:true, autosave:true, sound:true}
  };
  function load(){try{var s=JSON.parse(localStorage.getItem(LS)||'{}');return {company:Object.assign({},DEFAULTS.company,s.company||{}),system:Object.assign({},DEFAULTS.system,s.system||{})};}catch(e){return JSON.parse(JSON.stringify(DEFAULTS));}}
  function save(s){try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){}}
  window.set80=window.set80||load();
  // логотип отдельно (может быть большой)
  var LSLOGO='visasia_logo_v80';
  function loadLogo(){try{return localStorage.getItem(LSLOGO)||'';}catch(e){return '';}}
  window.set80Logo=window.set80Logo!==undefined?window.set80Logo:loadLogo();

  // ---------- применение настроек к CRM ----------
  window.set80Apply=function(){
    var s=window.set80;
    // логотип в углу
    try{
      var logos=document.querySelectorAll('.logo .mark');
      logos.forEach(function(el){
        if(window.set80Logo){
          el.style.backgroundImage='url('+window.set80Logo+')';
          el.style.backgroundSize='cover';
          el.style.backgroundPosition='center';
          el.textContent='';
        } else {
          el.style.backgroundImage='';

        }
      });

    // звук уже читается из set80.system.sound при уведомлениях
  };
  // звук уведомления (короткий бип через WebAudio — без внешних файлов)
  window.set80Beep=function(){
    if(!window.set80||!window.set80.system.sound)return;
    try{
      var Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;
      var ctx=window.__set80ctx||(window.__set80ctx=new Ctx());
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.value=880;
      g.gain.setValueAtTime(0.0001,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.12,ctx.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.18);
      o.start();o.stop(ctx.currentTime+0.2);
    }catch(e){}
  };
  // сколько строк показывать в таблицах (читают таблицы при желании)

        +'<div class="set80Row"><div class="lbl"><b>Звуковые уведомления</b><small>Короткий сигнал при новом событии</small></div>'+tog('sound',sys.sound)+'</div>'
      +'</div>'

        +'<div class="set80Head"><div class="set80Title">Уведомления<small>Какие события и куда отправлять</small></div><button class="set80TinyBtn" onclick="openNotifSettings()"><i class="fa-solid fa-bell"></i> Настроить</button></div>'
        +'<div class="set80Row"><div class="lbl"><b>Внутри CRM</b><small>Колокольчик и лента событий</small></div><span style="font-size:11.5px;color:#91efbf;font-weight:800">включено</span></div>'
        +'<div class="set80Row"><div class="lbl"><b>В Telegram менеджерам</b><small>Бот пишет менеджеру в личку</small></div><span class="set80StatusOff">после бота</span></div>'
      +'</div>'
      +(owner?'<div class="set80Panel">'

      +(owner?'<div class="set80Panel">'
        +'<div class="set80Head"><div class="set80Title">Команда<small>'+mgrs().length+' сотрудников</small></div><button class="set80TinyBtn" onclick="if(typeof openManagerCreate===\'function\')openManagerCreate();else go(\'managers\')"><i class="fa-solid fa-plus"></i> Добавить</button></div>'
        +teamList()

      +'</div>';

    return '<div class="set80">'
      +'<div class="setTop"><div><h1>Настройки</h1><p>Профиль компании, поведение CRM, роли команды. Интеграции и безопасность подключаются после запуска на сервере.</p></div>'
        +'<button class="btn primary set80SaveBtn" onclick="set80SaveCompany()"><i class="fa-solid fa-check"></i> Сохранить</button></div>'
      +'<div class="set80Grid"><div>'+left+'</div><div>'+right+'</div></div>'

<!-- v80b: связать настройки с поведением CRM (звук уведомлений + стартовая страница) -->
<script id="settings-v80-wire">
(function(){
  // звук при каждом toast, если включён в настройках
  if(typeof window.toast==='function' && !window.__set80ToastWrapped){
    window.__set80ToastWrapped=true;
    var nativeToast=window.toast;
    window.toast=function(t){try{if(typeof window.set80Beep==='function')window.set80Beep();}catch(e){} return nativeToast.apply(this,arguments);};
  }
  // применить стартовую страницу один раз после загрузки данных
  function applyStartPage(){
    if(window.__set80StartDone)return;
    var s=window.set80; if(!s||!s.system)return;
    var page=s.system.defaultPage||'dashboard';
    if(page && page!=='dashboard' && typeof go==='function'){
      window.__set80StartDone=true;
      try{go(page);}catch(e){}
    } else { window.__set80StartDone=true; }
  }
  // ждём появления данных, потом применяем стартовую страницу
  var tries=0;
  var iv=setInterval(function(){
    tries++;
    var ready=(typeof clients!=='undefined'&&clients&&clients.length) || (window.clients&&window.clients.length) || tries>20;
    if(ready){clearInterval(iv);setTimeout(applyStartPage,300);}
  },400);
})();
</script>

<script id="settings-v81-logic">
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function mgrs(){return (typeof managersData!=='undefined'&&Array.isArray(managersData))?managersData:(window.managersData||[]);}

  // ====== РАЗДЕЛЫ ДЛЯ ПРАВ ДОСТУПА ======
  var SECTIONS=[
    ['dashboard','Дэшборд'],['deals','Сделки'],['clients','Клиенты'],['tasks','Задачи'],
    ['finance','Оплата'],['managers','Менеджеры'],['analytics','Аналитика'],
    ['broadcast','Рассылки'],['settings','Настройки']
  ];
  var ALL=SECTIONS.map(function(s){return s[0];});

  // ====== ХРАНИЛИЩЕ РОЛЕЙ ======
  var LS_ROLES='visasia_roles_v81';
  function defaultRoles(){
    return [
      {id:'owner', name:'Директор', system:true, perms:ALL.slice()},
      {id:'head',  name:'Руководитель', system:true, perms:ALL.slice()},
      {id:'manager',name:'Менеджер', system:false, perms:['dashboard','deals','clients','tasks','broadcast']}
    ];
  }
  function loadRoles(){try{var r=JSON.parse(localStorage.getItem(LS_ROLES)||'null');return (r&&r.length)?r:defaultRoles();}catch(e){return defaultRoles();}}
  function saveRoles(r){try{localStorage.setItem(LS_ROLES,JSON.stringify(r));}catch(e){}}
  window.set81Roles=window.set81Roles||loadRoles();

  // ====== РЕДАКТОР РОЛЕЙ ======
  window.openRolesEditor=function(){
    if(!window.set81Roles||!window.set81Roles.length)window.set81Roles=loadRoles();
    var roles=window.set81Roles;
    var cnt={};mgrs().forEach(function(m){var r=String(m.role||'').toLowerCase();cnt[r]=(cnt[r]||0)+1;});
    var body=roles.map(function(role,ri){
      var perms=SECTIONS.map(function(s){
        var on=role.perms.indexOf(s[0])>=0;
        var locked=role.system; // системным ролям доступ не урезаем (полный)
        return '<span class="set81Perm '+(on?'on':'')+'" '+(locked?'style="opacity:.6;cursor:default"':'onclick="set81TogglePerm('+ri+',\''+s[0]+'\')"')+'>'+(on?'<i class="fa-solid fa-check"></i>':'')+esc(s[1])+'</span>';
      }).join('');
      return '<div class="set81RoleCard"><div class="set81RoleTop"><b>'+esc(role.name)+'</b>'
        +'<span class="set81RoleTag '+(role.system?'sys':'')+'">'+(role.system?'системная':'своя')+'</span>'
        +'<div class="set81RoleBtns">'
          +(role.system?'':'<button class="set81IBtn" onclick="set81RenameRole('+ri+')" title="Переименовать"><i class="fa-regular fa-pen-to-square"></i></button>')
          +(role.system?'':'<button class="set81IBtn del" onclick="set81DeleteRole('+ri+')" title="Удалить"><i class="fa-regular fa-trash-can"></i></button>')
        +'</div></div>'
        +'<div class="set81Perms">'+perms+'</div>'
        +(role.system?'<div style="font-size:11px;color:var(--muted);margin-top:8px">Полный доступ ко всем разделам (нельзя изменить)</div>':'')
      +'</div>';
    }).join('');
    showModal('<div class="set81Modal"><h3>Роли и права</h3>'
      +'<p class="muted" style="margin-top:-6px;font-size:12px">Отметьте, к каким разделам у роли есть доступ. Можно добавлять свои роли.</p>'
      +'<div class="set81Roles">'+body+'</div>'
      +'<button class="set81AddRole" onclick="set81AddRole()"><i class="fa-solid fa-plus"></i> Добавить роль</button>'
      +'<div class="set81NoteBox"><i class="fa-solid fa-circle-info"></i> Директор и Руководитель — системные роли с полным доступом. Их права не урезаются. Распределение прав начнёт ограничивать доступ менеджеров после запуска на сервере; сейчас настройка сохраняется и готова к подключению.</div>'
      +'<div class="modalActions"><button class="btn primary" onclick="closeModal()">Готово</button></div></div>');
  };
  window.set81TogglePerm=function(ri,sec){
    var role=window.set81Roles[ri];if(!role||role.system)return;
    var i=role.perms.indexOf(sec);
    if(i>=0)role.perms.splice(i,1);else role.perms.push(sec);
    saveRoles(window.set81Roles);openRolesEditor();
  };
  window.set81AddRole=function(){
    var name=prompt('Название новой роли:');if(!name||!name.trim())return;
    var id='role_'+Date.now();
    window.set81Roles.push({id:id,name:name.trim(),system:false,perms:['dashboard','clients']});
    saveRoles(window.set81Roles);openRolesEditor();
    if(typeof toast==='function')toast('Роль добавлена');
  };
  window.set81RenameRole=function(ri){
    var role=window.set81Roles[ri];if(!role||role.system)return;
    var name=prompt('Новое название роли:',role.name);if(!name||!name.trim())return;
    role.name=name.trim();saveRoles(window.set81Roles);openRolesEditor();
    if(typeof toast==='function')toast('Роль переименована');
  };
  window.set81DeleteRole=function(ri){
    var role=window.set81Roles[ri];if(!role||role.system)return;
    if(!confirm('Удалить роль «'+role.name+'»?'))return;
    window.set81Roles.splice(ri,1);saveRoles(window.set81Roles);openRolesEditor();
    if(typeof toast==='function')toast('Роль удалена');
  };

  // ====== СМЕНА ПАРОЛЯ (директор/текущий пользователь) ======
  window.openPasswordChange=function(){
    var u=window.currentUser||{name:'Директор',login:'director@visasia.kz'};
    showModal('<div class="set81Modal"><h3>Смена пароля</h3>'
      +'<p class="muted" style="margin-top:-6px;font-size:12px">'+esc(u.name||'')+' · '+esc(u.login||'')+'</p>'
      +'<div class="field"><label>Текущий пароль</label><input id="pwOld" type="password" placeholder="Введите текущий пароль"></div>'
      +'<div class="field"><label>Новый пароль</label><input id="pwNew" type="password" placeholder="Минимум 6 символов"></div>'
      +'<div class="field"><label>Повторите новый пароль</label><input id="pwNew2" type="password" placeholder="Ещё раз новый пароль"></div>'
      +'<div class="set81NoteBox"><i class="fa-solid fa-circle-info"></i> Пароли проверяются на сервере. Реальная смена пароля включится после запуска CRM на сервере (Railway). Сейчас форма готова и проверяет ввод, но не меняет пароль на «боевом» входе.</div>'
      +'<div class="modalActions"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn primary" onclick="set81SavePassword()">Сменить пароль</button></div></div>');
  };
  window.set81SavePassword=function(){
    var g=function(id){var el=document.getElementById(id);return el?el.value:'';};
    var oldp=g('pwOld'),np=g('pwNew'),np2=g('pwNew2');
    if(!oldp){if(typeof toast==='function')toast('Введите текущий пароль');return;}
    if(np.length<6){if(typeof toast==='function')toast('Новый пароль слишком короткий (мин. 6)');return;}
    if(np!==np2){if(typeof toast==='function')toast('Пароли не совпадают');return;}
    // на сервере: PATCH пароля. Сейчас — пробуем API, если есть; иначе честно сообщаем.
    if(typeof crmApi==='function'){
      try{crmApi('/api/auth/password','POST',{oldPassword:oldp,newPassword:np}).then(function(){if(typeof toast==='function')toast('Пароль изменён');}).catch(function(){if(typeof toast==='function')toast('Смена пароля заработает на сервере');});}catch(e){if(typeof toast==='function')toast('Смена пароля заработает на сервере');}
    } else { if(typeof toast==='function')toast('Смена пароля заработает на сервере'); }
    closeModal();
  };

  // ====== НАСТРОЙКА УВЕДОМЛЕНИЙ ======
  var LS_NOTIF='visasia_notif_v81';
  function defaultNotif(){
    return {
      events:{
        newLead:{name:'Новый лид / заявка', desc:'Когда клиент оставил заявку', inapp:true, tg:true},
        newTask:{name:'Новая задача', desc:'Назначена задача менеджеру', inapp:true, tg:false},
        overdue:{name:'Просроченная задача', desc:'Задача не выполнена в срок', inapp:true, tg:true},
        payment:{name:'Оплата получена', desc:'Клиент внёс оплату', inapp:true, tg:true},
        stage:{name:'Смена этапа сделки', desc:'Сделка перешла на новый этап', inapp:true, tg:false},
        broadcast:{name:'Рассылка отправлена', desc:'Завершена отправка рассылки', inapp:true, tg:false}
      }
    };
  }
  function loadNotif(){try{var n=JSON.parse(localStorage.getItem(LS_NOTIF)||'null');if(!n||!n.events)return defaultNotif();var d=defaultNotif();Object.keys(d.events).forEach(function(k){if(n.events[k]){d.events[k].inapp=!!n.events[k].inapp;d.events[k].tg=!!n.events[k].tg;}});return d;}catch(e){return defaultNotif();}}
  function saveNotif(n){try{localStorage.setItem(LS_NOTIF,JSON.stringify(n));}catch(e){}}
  window.set81Notif=window.set81Notif||loadNotif();

  window.openNotifSettings=function(){
    if(!window.set81Notif||!window.set81Notif.events)window.set81Notif=loadNotif();
    var n=window.set81Notif;
    var rows=Object.keys(n.events).map(function(k){
      var e=n.events[k];
      return '<div class="set81NotifRow"><div><b>'+esc(e.name)+'</b><small>'+esc(e.desc)+'</small></div>'
        +'<button class="set81Check '+(e.inapp?'on':'')+'" onclick="set81ToggleNotif(\''+k+'\',\'inapp\')"></button>'
        +'<button class="set81Check tg '+(e.tg?'on':'')+'" onclick="set81ToggleNotif(\''+k+'\',\'tg\')"></button>'
      +'</div>';
    }).join('');
    showModal('<div class="set81Modal"><h3>Уведомления</h3>'
      +'<p class="muted" style="margin-top:-6px;font-size:12px">Какие события и куда отправлять менеджерам.</p>'
      +'<div class="set81NotifGrid"><div class="set81NotifRow head"><span>Событие</span><span>В CRM</span><span>Telegram</span></div>'+rows+'</div>'
      +'<div class="set81NoteBox"><i class="fa-solid fa-circle-info"></i> Уведомления «В CRM» (колокольчик и лента) работают внутри системы. Отправка в Telegram активируется, когда подключим бота — настройки уже сохраняются и будут применены автоматически.</div>'
      +'<div class="modalActions"><button class="btn primary" onclick="closeModal()">Готово</button></div></div>');
  };
  window.set81ToggleNotif=function(key,chan){
    var e=window.set81Notif.events[key];if(!e)return;
    e[chan]=!e[chan];saveNotif(window.set81Notif);openNotifSettings();
  };
})();
</script>

.rv82Modal{max-width:680px}
.rv82Roles{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 14px}
.rv82RoleTab{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 13px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#cdd8ea;border-radius:10px;font-weight:800;font-size:12.5px;cursor:pointer;transition:.13s}
.rv82RoleTab.active{background:rgba(91,141,239,.16);border-color:rgba(91,141,239,.4);color:#cfe0ff}
.rv82RoleTab .sys{font-size:9px;font-weight:900;padding:2px 6px;border-radius:999px;background:rgba(242,214,139,.16);color:#f2d68b}
.rv82RoleTab .cnt{font-size:10.5px;opacity:.7}
.rv82AddBtn{height:36px;width:36px;border:1px dashed rgba(255,255,255,.18);background:transparent;color:#9db3da;border-radius:10px;cursor:pointer;font-size:13px}
.rv82AddBtn:hover{border-color:rgba(242,214,139,.4);color:#f2d68b}
.rv82RoleHead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rv82RoleHead b{font-size:15px}
.rv82RoleHead .ibtn{width:30px;height:30px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#9db3da;border-radius:8px;cursor:pointer;font-size:11px}
.rv82RoleHead .ibtn:hover{color:#fff;border-color:rgba(242,214,139,.3)}
.rv82RoleHead .ibtn.del:hover{color:#ff9ca5;border-color:rgba(239,100,111,.4)}
.rv82FullNote{font-size:12px;color:#91efbf;background:rgba(51,196,129,.1);border:1px solid rgba(51,196,129,.25);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.rv82Table{width:100%;border-collapse:collapse}
.rv82Table th{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:900;padding:8px 6px;text-align:center;border-bottom:1px solid var(--line)}
.rv82Table th:first-child{text-align:left;padding-left:2px}
.rv82Table td{padding:9px 6px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
.rv82Table td:first-child{text-align:left;font-size:13px;font-weight:700;color:#e7eefb;padding-left:2px}
.rv82Table tr:last-child td{border-bottom:0}
.rv82Cell{display:inline-flex;flex-direction:column;align-items:center;gap:0;cursor:pointer;user-select:none}
.rv82Dot{width:18px;height:18px;border-radius:50%;border:2px solid #3a4759;transition:.12s;position:relative}
.rv82Dot.lvl0{background:#ef646f;border-color:#ef646f}
.rv82Dot.lvl1{background:#5b8def;border-color:#5b8def}
.rv82Dot.lvl2{background:#f2c14e;border-color:#f2c14e}
.rv82Dot.lvl3{background:#33c481;border-color:#33c481}
.rv82Cell:hover .rv82Dot{transform:scale(1.18)}
.rv82Lvl{font-size:9px;color:var(--muted);margin-top:4px;white-space:nowrap;font-weight:700}
.rv82Legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:11.5px;color:#cdd8ea}
.rv82Legend .lg{display:flex;align-items:center;gap:7px}
.rv82Legend .d{width:13px;height:13px;border-radius:50%}
.rv82Hint{font-size:11px;color:var(--muted);margin-top:6px}
.rv82NoteBox{margin-top:12px;padding:11px 13px;border:1px solid rgba(242,160,68,.2);background:rgba(242,160,68,.06);border-radius:11px;font-size:11.5px;color:#e8c89a;line-height:1.5}
</style>

<script id="roles-v82-logic">
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function mgrs(){return (typeof managersData!=='undefined'&&Array.isArray(managersData))?managersData:(window.managersData||[]);}

  // объекты и действия
  var OBJECTS=[['deals','Сделки'],['clients','Клиенты'],['tasks','Задачи'],['finance','Оплаты'],['broadcast','Рассылки']];
  var ACTIONS=[['create','Создание'],['view','Просмотр'],['edit','Правка'],['delete','Удаление']];
  // уровни доступа (как в amoCRM)
  var LEVELS=['Запрещено','Если ответственный','Для группы','Разрешено'];
  var LEVEL_SHORT=['Запрещ.','Свои','Группа','Все'];

  var LS='visasia_roles_v82';

  function fullPerms(){var p={};OBJECTS.forEach(function(o){p[o[0]]={};ACTIONS.forEach(function(a){p[o[0]][a[0]]=3;});});return p;}
  function managerPerms(){
    // менеджер: свои сделки/клиенты/задачи, без удаления, оплаты только просмотр своих, рассылки своим
    var p={};
    OBJECTS.forEach(function(o){p[o[0]]={};ACTIONS.forEach(function(a){p[o[0]][a[0]]=1;});}); // по умолчанию «если ответственный»
    // удаление — запрещено почти везде
    ['deals','clients','tasks','finance','broadcast'].forEach(function(o){p[o].delete=0;});
    // оплаты: только просмотр своих, без создания/правки
    p.finance.create=0;p.finance.edit=0;p.finance.view=1;
    return p;
  }
  function headPerms(){
    // руководитель (РОП): почти всё «Разрешено», но НЕ полный как директор — например, без удаления оплат/рассылок
    var p={};OBJECTS.forEach(function(o){p[o[0]]={};ACTIONS.forEach(function(a){p[o[0]][a[0]]=3;});});
    p.finance.delete=0;        // не может удалять оплаты
    p.broadcast.delete=0;      // не может удалять чужие рассылки
    return p;
  }
  function defaultRoles(){
    return [
      {id:'owner', name:'Директор', system:true, perms:fullPerms()},
      {id:'head',  name:'Руководитель', system:false, perms:headPerms()},
      {id:'manager',name:'Менеджер', system:false, perms:managerPerms()}
    ];
  }
  function load(){try{var r=JSON.parse(localStorage.getItem(LS)||'null');if(r&&r.length)return r;}catch(e){}return defaultRoles();}
  function save(r){try{localStorage.setItem(LS,JSON.stringify(r));}catch(e){}}
  window.rv82Roles=window.rv82Roles||load();
  window.rv82Active=window.rv82Active||0;

  function roleCount(role){
    var map={'owner':['owner'],'head':['admin'],'manager':['manager']};
    var match=map[role.id]||[];
    return mgrs().filter(function(m){
      var r=String(m.role||'').toLowerCase();
      if(role.id==='owner')return r==='owner';
      if(role.id==='head')return r==='admin';
      if(role.id==='manager')return r!=='owner'&&r!=='admin';
      return false;
    }).length;
  }

  // генерит ВНУТРЕННЕЕ содержимое окна (то, что меняется при кликах)
  function rv82Body(){
    if(!window.rv82Roles||!window.rv82Roles.length)window.rv82Roles=load();
    var roles=window.rv82Roles;
    if(window.rv82Active>=roles.length)window.rv82Active=0;
    var role=roles[window.rv82Active];

    var tabs=roles.map(function(r,i){
      return '<button class="rv82RoleTab '+(i===window.rv82Active?'active':'')+'" onclick="rv82Select('+i+')">'+esc(r.name)+(r.system?' <span class="sys">директор</span>':'')+' <span class="cnt">'+roleCount(r)+'</span></button>';
    }).join('')+'<button class="rv82AddBtn" title="Добавить роль" onclick="rv82AddRole()"><i class="fa-solid fa-plus"></i></button>';

    var head='<div class="rv82RoleHead"><b>'+esc(role.name)+'</b>'
      +(role.system?'<span style="font-size:11px;color:#f2d68b">системная роль</span>'
        :'<button class="ibtn" onclick="rv82Rename()" title="Переименовать"><i class="fa-regular fa-pen-to-square"></i></button>'
         +(role.id==='head'||role.id==='manager'?'':'<button class="ibtn del" onclick="rv82Delete()" title="Удалить"><i class="fa-regular fa-trash-can"></i></button>'))
      +'</div>';

    var table;
    if(role.system){
      table='<div class="rv82FullNote"><i class="fa-solid fa-shield-halved"></i> Директор имеет полный доступ ко всем разделам и действиям. Эту роль изменить нельзя.</div>';
    } else {
      var thead='<tr><th>Раздел</th>'+ACTIONS.map(function(a){return '<th>'+a[1]+'</th>';}).join('')+'</tr>';
      var rows=OBJECTS.map(function(o){
        var cells=ACTIONS.map(function(a){
          var lvl=(role.perms[o[0]]&&role.perms[o[0]][a[0]]!=null)?role.perms[o[0]][a[0]]:0;
          return '<td><span class="rv82Cell" onclick="rv82Cycle(\''+o[0]+'\',\''+a[0]+'\')" title="'+LEVELS[lvl]+' — нажмите, чтобы изменить"><span class="rv82Dot lvl'+lvl+'"></span><span class="rv82Lvl">'+LEVEL_SHORT[lvl]+'</span></span></td>';
        }).join('');
        return '<tr><td>'+o[1]+'</td>'+cells+'</tr>';
      }).join('');
      table='<table class="rv82Table"><thead>'+thead+'</thead><tbody>'+rows+'</tbody></table>'
        +'<div class="rv82Hint">Нажимайте на кружок, чтобы переключить уровень доступа для действия.</div>';
    }

    var legend='<div class="rv82Legend">'
      +'<div class="lg"><span class="d" style="background:#ef646f"></span>Запрещено</div>'
      +'<div class="lg"><span class="d" style="background:#5b8def"></span>Если ответственный (свои)</div>'
      +'<div class="lg"><span class="d" style="background:#f2c14e"></span>Для группы</div>'
      +'<div class="lg"><span class="d" style="background:#33c481"></span>Разрешено (все)</div>'
    +'</div>';

    return '<h3>Роли и права</h3>'
      +'<p class="muted" style="margin-top:-6px;font-size:12px">Уровень доступа по каждому действию. Директор — всегда полный доступ, остальные роли настраиваются.</p>'
      +'<div class="rv82Roles">'+tabs+'</div>'
      +head+table+legend
      +'<div class="rv82NoteBox"><i class="fa-solid fa-circle-info"></i> Настройка сохраняется сейчас и будет ограничивать действия на сервере (Railway). До запуска сервера менеджер уже видит только своих клиентов — это работает на уровне базы.</div>'
      +'<div class="modalActions"><button class="btn primary" onclick="closeModal()">Готово</button></div>';
  }
  // открыть окно ОДИН раз
  window.openRolesEditor=function(){
    showModal('<div class="rv82Modal" id="rv82Wrap">'+rv82Body()+'</div>');
  };
  // обновить ТОЛЬКО содержимое уже открытого окна (без нового модального слоя)
  window.rv82Refresh=function(){
    var wrap=document.getElementById('rv82Wrap');
    if(wrap){ wrap.innerHTML=rv82Body(); }
    else { window.openRolesEditor(); }
  };

  window.rv82Select=function(i){window.rv82Active=i;rv82Refresh();};
  window.rv82Cycle=function(obj,act){
    var role=window.rv82Roles[window.rv82Active];if(!role||role.system)return;
    if(!role.perms[obj])role.perms[obj]={};
    var cur=role.perms[obj][act]||0;
    role.perms[obj][act]=(cur+1)%4; // 0→1→2→3→0
    save(window.rv82Roles);rv82Refresh();
  };
  window.rv82AddRole=function(){
    var name=prompt('Название новой роли:');if(!name||!name.trim())return;
    window.rv82Roles.push({id:'role_'+Date.now(),name:name.trim(),system:false,perms:managerPerms()});
    save(window.rv82Roles);window.rv82Active=window.rv82Roles.length-1;rv82Refresh();
    if(typeof toast==='function')toast('Роль добавлена');
  };
  window.rv82Rename=function(){
    var role=window.rv82Roles[window.rv82Active];if(!role||role.system)return;
    var name=prompt('Новое название роли:',role.name);if(!name||!name.trim())return;
    role.name=name.trim();save(window.rv82Roles);rv82Refresh();
    if(typeof toast==='function')toast('Роль переименована');
  };
  window.rv82Delete=function(){
    var role=window.rv82Roles[window.rv82Active];if(!role||role.system||role.id==='head'||role.id==='manager')return;
    if(!confirm('Удалить роль «'+role.name+'»?'))return;
    window.rv82Roles.splice(window.rv82Active,1);window.rv82Active=0;save(window.rv82Roles);rv82Refresh();
    if(typeof toast==='function')toast('Роль удалена');
  };

  // краткая сводка для панели настроек (заменяет старую rolesSummary)
  window.rv82Summary=function(){
    if(!window.rv82Roles||!window.rv82Roles.length)window.rv82Roles=load();
    return window.rv82Roles.map(function(r){
      var icon=r.id==='owner'?'fa-user-shield':r.id==='head'?'fa-user-gear':r.id==='manager'?'fa-user':'fa-user-tag';
      var desc=r.system?'Полный доступ ко всем разделам':(r.id==='head'?'Расширенный доступ (настраивается)':r.id==='manager'?'Свои сделки и клиенты':'Своя роль');
      return '<div class="set80TeamRow"><span class="set80Avatar" style="background:linear-gradient(135deg,#c99d42,#7d6a3a)"><i class="fa-solid '+icon+'"></i></span><div style="flex:1"><b style="display:block">'+esc(r.name)+'</b><small class="set80TeamRole">'+desc+'</small></div><span class="set80RoleBadge">'+roleCount(r)+'</span></div>';
    }).join('');
  };
})();
</script>

<!-- v83: заставка загрузки — скрывает мелькание демо-данных до прихода реальных -->
<style id="boot-splash-v83">
#bootSplash83{position:fixed;inset:0;z-index:99999;background:#0a0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .35s ease}
#bootSplash83.hide{opacity:0;pointer-events:none}
#bootSplash83 .bs-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(145deg,#f2d68b,#c99d42);display:grid;place-items:center;font-weight:900;font-size:26px;color:#0b0f17}
#bootSplash83 .bs-name{font-size:18px;font-weight:800;letter-spacing:.5px;color:#fff;font-family:Inter,system-ui,sans-serif}
#bootSplash83 .bs-name span{color:#f2d68b}
#bootSplash83 .bs-bar{width:140px;height:4px;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden;position:relative}
#bootSplash83 .bs-bar::after{content:'';position:absolute;left:-40%;top:0;height:100%;width:40%;border-radius:4px;background:linear-gradient(90deg,#f2d68b,#c99d42);animation:bs83 1.1s infinite ease-in-out}
@keyframes bs83{0%{left:-40%}100%{left:100%}}
</style>
<script id="boot-splash-v83-logic">
(function(){
  // вставляем заставку как можно раньше
  function inject(){
    if(document.getElementById('bootSplash83'))return;
    var d=document.createElement('div');
    d.id='bootSplash83';
    d.innerHTML='<div class="bs-logo">V</div><div class="bs-name">VIS<span>ASIA</span></div><div class="bs-bar"></div>';
    (document.body||document.documentElement).appendChild(d);
  }
  if(document.body)inject(); else document.addEventListener('DOMContentLoaded',inject);

  function hide(){
    var s=document.getElementById('bootSplash83');
    if(s){s.classList.add('hide');setTimeout(function(){if(s&&s.parentNode)s.parentNode.removeChild(s);},400);}
  }
  // скрыть когда пришли реальные данные
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='VISASIA_DATA'){ setTimeout(hide,120); }
  });
  // страховка: если данные не пришли (открыли напрямую/демо) — убрать через 2.5с, чтобы не висела вечно
  setTimeout(hide,2500);
})();
</script>

<!-- v84: запоминание текущего раздела при обновлении страницы -->
<script id="remember-page-v84">
(function(){
  var LS='visasia_last_page_v84';
  // обернуть go(), чтобы запоминать последний раздел
  function wrapGo(){
    if(typeof window.go!=='function'||window.__goWrapped84)return;
    window.__goWrapped84=true;
    var nativeGo=window.go;
    window.go=function(p){
      try{ if(p) localStorage.setItem(LS,p); }catch(e){}
      return nativeGo.apply(this,arguments);
    };
  }
  wrapGo();
  // если go ещё не готов — подождать
  if(!window.__goWrapped84){var t=setInterval(function(){wrapGo();if(window.__goWrapped84)clearInterval(t);},200);setTimeout(function(){clearInterval(t);},4000);}

  // восстановить последний раздел после загрузки данных (вместо дэшборда/стартовой)
  function restore(){
    if(window.__pageRestored84)return;
    var last='';
    try{ last=localStorage.getItem(LS)||''; }catch(e){}
    if(!last)return; // нет сохранённого — оставляем как есть (стартовая из настроек сработает)
    window.__pageRestored84=true;
    // отключаем разовое применение «стартовой страницы» из v80, чтобы не перебивало
    window.__set80StartDone=true;
    if(typeof go==='function' && last){ try{go(last);}catch(e){} }
  }
  var tries=0;
  var iv=setInterval(function(){
    tries++;
    var ready=(typeof clients!=='undefined'&&clients&&clients.length)||(window.clients&&window.clients.length)||tries>22;
    if(ready){clearInterval(iv);setTimeout(restore,360);}
  },400);
})();
</script>
